<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RivetDB · Live Order Book</title>
<style>
  :root{--bg:#0a0f17;--panel:#121a26;--line:#1f2c3d;--text:#dce6f2;--muted:#7c8da3;--bid:#1fbf75;--ask:#e5484d;--accent:#16d39a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:20px;min-height:100vh;}
  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px;}
  .brand{font-size:22px;font-weight:800;}.brand span{color:var(--accent);}
  .ticker{display:flex;gap:26px;align-items:baseline;}
  .ticker .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .ticker .val{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;}
  .ticker .val.small{font-size:18px;font-weight:700;}
  .grid{display:grid;grid-template-columns:360px 1fr;gap:18px;}
  @media(max-width:820px){.grid{grid-template-columns:1fr;}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;}
  h2{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;}
  table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums;font-size:14px;}
  td{padding:3px 8px;position:relative;}
  .px{font-weight:700;text-align:left;width:90px;}.qt{text-align:right;color:var(--muted);}
  .ask .px{color:var(--ask);}.bid .px{color:var(--bid);}
  .bar{position:absolute;top:1px;bottom:1px;right:0;opacity:.16;border-radius:3px;}
  .ask .bar{background:var(--ask);}.bid .bar{background:var(--bid);}
  .spreadrow td{text-align:center;color:var(--muted);font-size:12px;padding:8px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);letter-spacing:1px;}
  canvas{width:100%;height:200px;display:block;}
  .tape{max-height:230px;overflow:auto;font-size:13px;font-variant-numeric:tabular-nums;}
  .tape .row{display:flex;justify-content:space-between;padding:3px 6px;border-bottom:1px solid #16202e;}
  .tape .buy{color:var(--bid);}.tape .sell{color:var(--ask);}
  .joinbar{margin-top:16px;background:var(--panel);border:1px dashed var(--line);border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .joinbar b{color:var(--accent);}
  .foot{margin-top:10px;color:var(--muted);font-size:12px;}
  code{background:#0d1622;padding:2px 6px;border-radius:5px;color:var(--accent);}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);margin-right:5px;}
  .dot.off{background:#5b6b80;box-shadow:none;}
  .ctrl{display:flex;gap:10px;align-items:center;}
  .ctrl button{padding:9px 16px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;color:#fff;}
  .ctrl .start{background:var(--bid);}.ctrl .stop{background:var(--ask);}.ctrl .reset{background:#1c2738;color:var(--text);}
</style>
</head>
<body>
  <header>
    <div class="brand">Rivet<span>DB</span> · Live Order Book</div>
    <div class="ticker">
      <div><div class="lbl">Last</div><div class="val" id="last">—</div></div>
      <div><div class="lbl">Spread</div><div class="val small" id="spread">—</div></div>
      <div><div class="lbl">Volume</div><div class="val small" id="vol">—</div></div>
      <div><div class="lbl"><span class="dot" id="botdot"></span>Bots</div><div class="val small" id="bots">—</div></div>
    </div>
    <div class="ctrl">
      <button class="start" onclick="bots(true)">▶ Start market</button>
      <button class="stop" onclick="bots(false)">■ Stop market</button>
      <button class="reset" onclick="resetBook()">↻ Reset</button>
    </div>
  </header>

  <div class="grid">
    <div class="panel">
      <h2>Order Book — depth</h2>
      <table><tbody id="asks"></tbody>
        <tbody><tr class="spreadrow"><td colspan="2" id="spreadrow">—</td></tr></tbody>
        <tbody id="bids"></tbody>
      </table>
    </div>
    <div>
      <div class="panel"><h2>Last price</h2><canvas id="chart"></canvas></div>
      <div class="panel" style="margin-top:18px;"><h2>Trade tape</h2><div class="tape" id="tape"></div></div>
    </div>
  </div>

  <div class="joinbar">
    <div>📲 Place orders from your phone → <b id="tradeurl">…/trade</b></div>
    <div class="foot">Powered by RivetDB — book = <code>Sorted Set</code>, tape = <code>List</code>, chart = <code>TimeSeries</code></div>
  </div>

<script>
const tradeUrl = location.origin + '/trade';
document.getElementById('tradeurl').textContent = tradeUrl;

function rowsHtml(levels, cls, maxQ){
  return levels.map(l=>{
    const w = maxQ? Math.max(4,(l.qty/maxQ)*100):0;
    return `<tr class="${cls}"><td class="px">${l.price.toFixed(0)}</td><td class="qt">${l.qty}<span class="bar" style="width:${w}%"></span></td></tr>`;
  }).join('');
}

function drawChart(pts){
  const c=document.getElementById('chart'), ctx=c.getContext('2d');
  const w=c.width=c.clientWidth, h=c.height=200;
  ctx.clearRect(0,0,w,h);
  if(pts.length<2) return;
  const ps=pts.map(p=>p.p), min=Math.min(...ps), max=Math.max(...ps), rng=(max-min)||1;
  ctx.beginPath();
  pts.forEach((p,i)=>{const x=(i/(pts.length-1))*w, y=h-8-((p.p-min)/rng)*(h-16); i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
  ctx.strokeStyle='#16d39a'; ctx.lineWidth=2; ctx.stroke();
  ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath();
  ctx.fillStyle='rgba(22,211,154,.10)'; ctx.fill();
}

async function tick(){
  try{
    const b=await (await fetch('/book',{cache:'no-store'})).json();
    document.getElementById('last').textContent = b.last!=null? b.last.toFixed(0):'—';
    document.getElementById('spread').textContent = b.spread!=null? b.spread:'—';
    document.getElementById('vol').textContent = b.volume ?? '—';
    document.getElementById('bots').textContent = b.botsOn?'ON':'off';
    document.getElementById('botdot').className = 'dot'+(b.botsOn?'':' off');
    const maxQ=Math.max(1,...b.bids.map(x=>x.qty),...b.asks.map(x=>x.qty));
    // asks: show highest at top, best (lowest) just above spread
    document.getElementById('asks').innerHTML = rowsHtml([...b.asks].reverse(),'ask',maxQ);
    document.getElementById('bids').innerHTML = rowsHtml(b.bids,'bid',maxQ);
    document.getElementById('spreadrow').textContent =
      (b.bestBid!=null&&b.bestAsk!=null)? `${b.bestBid.toFixed(0)}  ↔  ${b.bestAsk.toFixed(0)}   (spread ${b.spread})` : 'no market';
    document.getElementById('tape').innerHTML = b.trades.map(t=>
      `<div class="row"><span class="${t.side}">${t.side.toUpperCase()}</span><span>${t.qty} @ ${t.price.toFixed(0)}</span><span style="color:#5b6b80">${t.trader}</span></div>`).join('');
    drawChart(b.chart);
  }catch(e){}
}
async function bots(on){
  await fetch('/bots',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({on})});
  tick();
}
async function resetBook(){
  if(!confirm('Reset the order book to a clean market?')) return;
  await fetch('/reset',{method:'POST'}); tick();
}
setInterval(tick,400); tick();
</script>
</body>
</html>
